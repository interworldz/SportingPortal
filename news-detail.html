<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Спорт-Портал</a>
            <div class="navbar-nav">
                <a class="nav-link" href="about.html">Про сайт</a>
                <a class="nav-link" href="gallery.html">Галерея</a>
                <a class="nav-link active" href="index.html#news-container">Новини</a>
                <a class="nav-link" href="contact.html">Контакти</a>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <article class="mb-5">
            <h1 id="news-title" class="mb-4">Завантаження новини...</h1>
            <p id="news-content" class="lead"></p>
            <a href="index.html" class="btn btn-secondary">Повернутися на головну</a>
        </article>

        <section>
            <h2 class="mb-4">Останні спортивні події</h2>
            <div id="latest-news" class="row row-cols-1 row-cols-md-3 g-4"></div>
        </section>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const newsId = Number.parseInt(params.get('id'), 10);
        const titleElement = document.getElementById('news-title');
        const contentElement = document.getElementById('news-content');
        const latestNewsElement = document.getElementById('latest-news');

        function showError(message) {
            titleElement.textContent = 'Новину не знайдено';
            contentElement.textContent = message;
        }

        if (Number.isInteger(newsId) && newsId >= 0) {
            fetch(`/api/news/${newsId}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Новину не знайдено');
                    }
                    return response.json();
                })
                .then(item => {
                    titleElement.textContent = item.title;
                    contentElement.textContent = item.text;
                    document.title = item.title;
                })
                .catch(() => showError('Перевірте посилання або поверніться на головну сторінку.'));
        } else {
            showError('Відсутній або неправильний ідентифікатор новини.');
        }

        fetch('/api/news')
            .then(response => response.json())
            .then(data => {
                latestNewsElement.innerHTML = '';
                data.forEach((item, index) => {
                    const column = document.createElement('div');
                    column.className = 'col';

                    const card = document.createElement('a');
                    card.className = 'card h-100 text-decoration-none text-dark';
                    card.href = `news-detail.html?id=${index}`;

                    const cardBody = document.createElement('div');
                    cardBody.className = 'card-body';

                    const title = document.createElement('h5');
                    title.className = 'card-title';
                    title.textContent = item.title;

                    const text = document.createElement('p');
                    text.className = 'card-text';
                    text.textContent = item.text;

                    cardBody.append(title, text);
                    card.appendChild(cardBody);

                    column.appendChild(card);
                    latestNewsElement.appendChild(column);
                });
            })
            .catch(() => {
                latestNewsElement.innerHTML = '<p class="text-muted">Не вдалося завантажити список новин.</p>';
            });
    </script>
</body>
</html>
